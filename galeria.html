<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <title>Mamako Loko Shop | Galeria de Imagens Dinâmica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            gold: '#FFD700',
                            orange: '#E65C00',
                            dark: '#070708',
                            card: '#0F0F12',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-dark text-gray-100 font-inter antialiased min-h-screen flex flex-col justify-between">

    <nav class="bg-brand-dark border-b border-neutral-800 py-4 px-6 sticky top-0 z-40 backdrop-blur-md bg-brand-dark/95">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3 hover:opacity-90 transition-opacity">
                <i class="fas fa-arrow-left text-brand-orange text-xl"></i>
                <span class="font-cinzel font-black text-lg tracking-wider bg-gradient-to-r from-brand-gold via-brand-orange to-red-500 bg-clip-text text-transparent">VOLTAR AO CATÁLOGO</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 id="accountTitle" class="font-cinzel font-black text-xl sm:text-2xl md:text-3xl text-brand-gold tracking-wide uppercase">Carregando conta...</h1>
            <p id="accountTagline" class="text-gray-400 text-xs sm:text-sm mt-1">Buscando detalhes na planilha...</p>
        </div>

        <div id="loading" class="text-center py-20">
            <i class="fas fa-spinner animate-spin text-brand-orange text-5xl mb-4"></i>
            <p class="text-gray-400">A carregar os prints oficiais da conta...</p>
        </div>

        <div id="galleryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 hidden">
            </div>
    </main>

    <div id="lightbox" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center hidden">
        <button id="lbClose" class="absolute top-4 right-4 text-white text-3xl hover:text-brand-orange transition-colors z-50 p-2">
            <i class="fas fa-times"></i>
        </button>

        <div class="relative max-w-5xl max-h-[80vh] w-full h-full flex items-center justify-center px-4">
            <button id="lbPrev" class="hidden md:flex absolute left-4 text-white hover:text-brand-orange text-4xl p-4 transition-all"><i class="fas fa-chevron-left"></i></button>
            <img id="lbImg" src="" alt="Print" class="max-w-full max-h-full object-contain rounded shadow-2xl">
            <button id="lbNext" class="hidden md:flex absolute right-4 text-white hover:text-brand-orange text-4xl p-4 transition-all"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="flex md:hidden items-center space-x-12 mt-6 z-50 bg-neutral-900/80 px-6 py-2.5 rounded-full border border-neutral-800">
            <button id="lbPrev2" class="text-white hover:text-brand-orange text-2xl p-2"><i class="fas fa-chevron-left"></i></button>
            <span id="lbCounter" class="text-xs font-mono text-gray-400">0 / 0</span>
            <button id="lbNext2" class="text-white hover:text-brand-orange text-2xl p-2"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script>
        // Mesma URL utilizada na Home
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSGMz9XAk5spv5FFN585VM6g6toC79iulNUFqYB76MQmRTuhjnyTjRSybOuyhZ5FImNompOX0eFjZI0/pub?output=csv";

        let images = [];
        let currentImageIndex = 0;

        // Captura o ID passado na URL (?id=001)
        const urlParams = new URLSearchParams(window.location.search);
        const accountId = urlParams.get('id');

        async function fetchGalleryData() {
            if (!accountId) {
                document.getElementById('accountTitle').innerText = "Conta não especificada";
                document.getElementById('loading').classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(googleSheetCsvUrl);
                const csvText = await response.text();

                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function (results) {
                        // Encontra a conta correspondente ao ID passado por parâmetro
                        const account = results.data.find(row => row.id && row.id.trim() === accountId.trim());

                        if (account) {
                            document.getElementById('accountTitle').innerText = account.title || `Conta Cód: ${accountId}`;
                            document.getElementById('accountTagline').innerText = account.tagline || '';

                            // Trata a string de prints separando-as por vírgula
                            if (account.prints && account.prints.trim() !== '') {
                                images = account.prints.split(',').map(img => img.trim()).filter(img => img !== '');
                            }

                            renderGrid();
                        } else {
                            document.getElementById('accountTitle').innerText = "Conta não encontrada";
                            document.getElementById('accountTagline').innerText = "Verifique se o ID está correto na planilha.";
                            document.getElementById('loading').classList.add('hidden');
                        }
                    },
                    error: function (err) {
                        console.error("Erro ao processar o CSV da galeria: ", err);
                        document.getElementById('loading').innerText = "Erro ao carregar os dados da galeria.";
                    }
                });
            } catch (error) {
                console.error("Erro na requisição da galeria: ", error);
                document.getElementById('loading').innerText = "Erro ao conectar com a nuvem.";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('galleryGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';

            if (images.length === 0) {
                loading.innerHTML = `<p class="text-gray-500 text-sm"><i class="fas fa-image-slash block text-3xl mb-2 text-neutral-700"></i>Nenhum print cadastrado para esta conta.</p>`;
                return;
            }

            images.forEach((imgUrl, index) => {
                const item = document.createElement('div');
                item.className = "relative aspect-[4/3] bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden cursor-pointer group hover:border-brand-orange/50 transition-all";
                item.innerHTML = `
                    <img src="${imgUrl}" alt="Print ${index + 1}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <i class="fas fa-search-plus text-white text-xl"></i>
                    </div>
                `;
                item.addEventListener('click', () => openLightbox(index));
                grid.appendChild(item);
            });

            loading.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        // ── CONTROLES DO LIGHTBOX ──────────────────────────────────────
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lbImg');
        const lbCounter = document.getElementById('lbCounter');

        function openLightbox(index) {
            currentImageIndex = index;
            lb.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Trava o scroll de fundo
            updateLightbox();
        }

        function closeLightbox() {
            lb.classList.add('hidden');
            document.body.style.overflow = ''; // Destrava o scroll
        }

        function updateLightbox() {
            if (images.length === 0) return;
            lbImg.src = images[currentImageIndex];
            lbCounter.innerText = `${currentImageIndex + 1} / ${images.length}`;
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateLightbox();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateLightbox();
        }

        // Eventos dos botões
        document.getElementById('lbClose').addEventListener('click', closeLightbox);
        document.getElementById('lbOriginalClose')?.addEventListener('click', closeLightbox);
        document.getElementById('lbPrev').addEventListener('click', prevImage);
        document.getElementById('lbNext').addEventListener('click', nextImage);
        document.getElementById('lbPrev2').addEventListener('click', prevImage);
        document.getElementById('lbNext2').addEventListener('click', nextImage);

        // Fechar clicando fora da imagem
        lb.addEventListener('click', e => { if (e.target === lb || e.target === lbImg.parentElement) closeLightbox(); });

        // Atalhos de teclado
        document.addEventListener('keydown', e => {
            if (lb.classList.contains('hidden')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });

        // Suporte a gestos Swipe (arrastar pro lado no mobile)
        let touchStartX = 0;
        lb.addEventListener('touchstart', e => { if (e.touches.length === 1) touchStartX = e.changedTouches[0].clientX; });
        lb.addEventListener('touchend', e => {
            if (e.changedTouches.length !== 1) return;
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) diff > 0 ? nextImage() : prevImage();
        });

        // Inicializa buscando dados da planilha pública
        window.onload = fetchGalleryData;
    </script>
</body>

</html>
